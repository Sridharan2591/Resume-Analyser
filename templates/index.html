<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">
AI Resume Analyzer & Career Guidance
</h1>

<div class="card shadow p-4">

<h3>Upload Resume</h3>

<form id="resumeForm">

<input
type="file"
name="resume"
class="form-control mb-3"
accept=".pdf"
required>

<button
type="submit"
class="btn btn-primary w-100">
Analyze Resume
</button>

</form>

</div>

<div id="atsSection"></div>

<div id="skillsSection"></div>

<div id="suggestionsSection"></div>

<div id="jobsSection"></div>

<div id="learningSection"></div>

<div class="text-center mt-4">

<a href="/history_page" class="btn btn-success">
Resume History
</a>

<a href="/jd_page" class="btn btn-warning">
Resume vs JD Match
</a>

</div>

</div>

<script>

document.getElementById("resumeForm")
.addEventListener("submit",async function(e){

e.preventDefault();

let formData = new FormData(this);

let response = await fetch("/upload",{
method:"POST",
body:formData
});

let data = await response.json();

document.getElementById("atsSection").innerHTML=`

<div class="card mt-4">
<div class="card-body">

<h3>ATS Score</h3>

<div class="progress">

<div class="progress-bar"
style="width:${data.ats_score}%">

${data.ats_score}%

</div>

</div>

</div>
</div>
`;

let skills="";

data.skills.forEach(skill=>{
skills += `<li>${skill}</li>`;
});

document.getElementById("skillsSection").innerHTML=`

<div class="card mt-4">
<div class="card-body">

<h3>Skills Found</h3>

<ul>
${skills}
</ul>

</div>
</div>
`;

let suggestions="";

data.suggestions.forEach(item=>{
suggestions += `<li>${item}</li>`;
});

document.getElementById("suggestionsSection").innerHTML=`

<div class="card mt-4">
<div class="card-body">

<h3>Resume Suggestions</h3>

<ul>
${suggestions}
</ul>

</div>
</div>
`;

let jobs="";

data.jobs.forEach(job=>{

jobs += `

<div class="card mb-2">

<div class="card-body">

<h5>${job.title}</h5>

<p>${job.company}</p>

<a href="${job.url}"
target="_blank"
class="btn btn-primary">

Apply Now

</a>

</div>

</div>
`;

});

document.getElementById("jobsSection").innerHTML=`

<h3 class="mt-4">
Available Jobs
</h3>

${jobs}
`;

document.getElementById("learningSection").innerHTML=`

<div class="card mt-4">

<div class="card-body">

<h3>Coding Practice</h3>

<div class="row">

<div class="col-md-4">

<a href="https://leetcode.com"
target="_blank"
class="btn btn-warning w-100">

LeetCode

</a>

</div>

<div class="col-md-4">

<a href="https://www.hackerrank.com"
target="_blank"
class="btn btn-success w-100">

HackerRank

</a>

</div>

<div class="col-md-4">

<a href="https://www.geeksforgeeks.org"
target="_blank"
class="btn btn-primary w-100">

GeeksforGeeks

</a>

</div>

</div>

</div>

</div>
`;

});

</script>

</body>
</html>
