<!DOCTYPE html>
<html>
<head>

<title>Resume vs JD Matching</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Resume vs Job Description Match</h2>

<form id="jdForm">

<input
type="file"
name="resume"
class="form-control mb-3"
required>

<input
type="file"
name="jd"
class="form-control mb-3"
required>

<button
type="submit"
class="btn btn-success">

Check Match

</button>

</form>

<div id="result"
class="mt-4"></div>

<a href="/"
class="btn btn-primary mt-3">

Back

</a>

</div>

<script>

document
.getElementById("jdForm")

.addEventListener(
"submit",
async function(e){

e.preventDefault();

let formData =
new FormData(this);

let response =
await fetch(
"/jd_match",
{
method:"POST",
body:formData
}
);

let data =
await response.json();

document
.getElementById("result")
.innerHTML=`

<div class="card">

<div class="card-body">

<h3>

Match Score:
${data.match_score}%

</h3>

<h4>

Matched Skills

</h4>

<p>

${data.matched_skills.join(", ")}

</p>

<h4>

Missing Skills

</h4>

<p>

${data.missing_skills.join(", ")}

</p>

</div>

</div>

`;

});

</script>

</body>
</html>
